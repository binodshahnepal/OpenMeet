services:
  # Database: PostgreSQL
  postgres:
    image: postgres:17-alpine
    container_name: openmeet-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: openmeet
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  # Cache: Redis
  redis:
    image: redis:7-alpine
    container_name: openmeet-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  # Object Storage: MinIO (S3 Compatible)
  minio:
    image: minio/minio:latest
    container_name: openmeet-minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadminpassword
    ports:
      - "9000:9000" # API
      - "9001:9001" # Console/UI
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data

  # Media Server: LiveKit
  livekit:
    image: livekit/livekit-server:latest
    container_name: openmeet-livekit
    restart: unless-stopped
    command: --config /etc/livekit.yaml
    ports:
      - "7880:7880" # HTTP API / WS Signaling
      - "7881:7881" # TCP RTC
      - "50000-50050:50000-50050/udp" # WebRTC UDP Range (small range for dev convenience)
    volumes:
      - ./livekit.yaml:/etc/livekit.yaml:ro
    network_mode: bridge # LiveKit works best with bridge or host network mode

volumes:
  postgres_data:
  redis_data:
  minio_data:
