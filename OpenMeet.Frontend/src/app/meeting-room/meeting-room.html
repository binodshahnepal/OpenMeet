<div class="min-h-screen w-full bg-neutral-950 text-neutral-100 flex flex-col relative overflow-hidden">
  
  <!-- 1. TOP INFORMATION HEADER -->
  <header class="w-full px-6 py-4 bg-gradient-to-b from-black/80 to-transparent flex items-center justify-between absolute top-0 left-0 z-20">
    <div class="flex items-center gap-3">
      <div class="px-3 py-1.5 bg-purple-500/10 border border-purple-500/30 rounded-full text-xs font-semibold text-purple-300 flex items-center gap-2">
        <span class="w-2 h-2 rounded-full bg-purple-500 animate-ping"></span>
        <span>LOBBY PREVIEW</span>
      </div>
      <div class="text-sm text-neutral-400">
        Room Code: <span class="text-white font-mono font-semibold">{{ roomCode() }}</span>
      </div>
    </div>

    <div class="text-sm font-medium text-neutral-300">
      Participant: <span class="text-purple-400 font-semibold">{{ userName() }}</span>
    </div>
  </header>

  <!-- 2. MAIN MEDIA AREA -->
  <main class="flex-1 flex items-center justify-center p-6 relative z-10">
    <!-- Media Video Container Grid -->
    <div class="w-full max-w-4xl aspect-video bg-neutral-900 border border-white/5 rounded-3xl overflow-hidden relative shadow-2xl flex items-center justify-center">
      
      <!-- Video Element -->
      <video
        #localVideo
        autoplay
        playsinline
        muted
        [class.hidden]="!cameraActive() || errorMessage()"
        class="w-full h-full object-cover rounded-3xl"
      ></video>

      <!-- Camera Off Placeholder Avatar -->
      <div *ngIf="!cameraActive() && !errorMessage()" class="flex flex-col items-center gap-4 animate-fade-in">
        <div class="w-24 h-24 rounded-full bg-white/5 border border-white/10 flex items-center justify-center text-3xl font-extrabold text-neutral-400 shadow-inner">
          {{ userName().substring(0, 2).toUpperCase() }}
        </div>
        <span class="text-sm text-neutral-500 font-medium">Your camera is turned off</span>
      </div>

      <!-- Error Media Blocked Alert -->
      <div *ngIf="errorMessage()" class="flex flex-col items-center text-center p-6 max-w-md animate-fade-in">
        <div class="w-16 h-16 bg-red-500/10 border border-red-500/30 rounded-full flex items-center justify-center text-red-400 mb-4">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" />
          </svg>
        </div>
        <h3 class="text-lg font-bold text-white mb-2">Media Permission Blocked</h3>
        <p class="text-sm text-neutral-400 leading-relaxed mb-6">{{ errorMessage() }}</p>
        <button 
          (click)="leaveRoom()" 
          class="px-5 py-2.5 bg-neutral-800 hover:bg-neutral-700 text-white text-sm font-semibold rounded-xl transition-all duration-300"
        >
          Return to Dashboard
        </button>
      </div>

      <!-- Connecting Overlay Spinner -->
      <div *ngIf="isConnecting() && !errorMessage()" class="absolute inset-0 bg-neutral-950 flex flex-col items-center justify-center gap-4 z-10">
        <div class="w-10 h-10 border-4 border-purple-500/20 border-t-purple-500 rounded-full animate-spin"></div>
        <span class="text-sm text-neutral-400">{{ status() }}</span>
      </div>

      <!-- Micro bottom indicator pill -->
      <div class="absolute bottom-4 left-4 px-3 py-1 bg-black/60 backdrop-blur-md rounded-lg text-xs text-neutral-300 border border-white/5 flex items-center gap-2">
        <span class="w-1.5 h-1.5 rounded-full" [ngClass]="micActive() ? 'bg-emerald-500' : 'bg-red-500'"></span>
        <span>{{ micActive() ? 'Microphone Active' : 'Microphone Muted' }}</span>
      </div>
    </div>
  </main>

  <!-- 3. FLOOR FLOATING CONTROLS BAR -->
  <footer class="w-full p-6 bg-gradient-to-t from-black/80 to-transparent flex items-center justify-center absolute bottom-0 left-0 z-20">
    <div class="flex items-center gap-4 bg-white/5 backdrop-blur-lg border border-white/10 px-6 py-3.5 rounded-2xl shadow-xl">
      
      <!-- Microphone Toggle -->
      <button
        (click)="toggleMic()"
        [class.bg-red-500]="!micActive()"
        [class.text-white]="!micActive()"
        [class.bg-white/10]="micActive()"
        [class.hover:bg-white/20]="micActive()"
        class="w-12 h-12 rounded-xl flex items-center justify-center transition-all duration-300 active:scale-[0.93] text-neutral-300 cursor-pointer"
        title="Toggle Microphone"
      >
        <!-- Mic Icon (On) -->
        <svg *ngIf="micActive()" xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M19 11a7 7 0 01-7 7m0 0a7 7 0 01-7-7m7 7v4m0 0H8m4 0h4m-4-8a3 3 0 01-3-3V5a3 3 0 116 0v6a3 3 0 01-3 3z" />
        </svg>
        <!-- Mic Icon (Off) -->
        <svg *ngIf="!micActive()" xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M5.586 15H4a1 1 0 01-1-1v-4a1 1 0 011-1h1.586l4.707-4.707C10.923 3.663 12 4.109 12 5v14c0 .891-1.077 1.337-1.707.707L5.586 15z" />
        </svg>
      </button>

      <!-- Camera Toggle -->
      <button
        (click)="toggleCamera()"
        [class.bg-red-500]="!cameraActive()"
        [class.text-white]="!cameraActive()"
        [class.bg-white/10]="cameraActive()"
        [class.hover:bg-white/20]="cameraActive()"
        class="w-12 h-12 rounded-xl flex items-center justify-center transition-all duration-300 active:scale-[0.93] text-neutral-300 cursor-pointer"
        title="Toggle Camera"
      >
        <!-- Video Icon (On) -->
        <svg *ngIf="cameraActive()" xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M15 10l4.553-2.276A1 1 0 0121 8.618v6.764a1 1 0 01-1.447.894L15 14M5 18h8a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z" />
        </svg>
        <!-- Video Icon (Off) -->
        <svg *ngIf="!cameraActive()" xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M18.364 18.364A9 9 0 005.636 5.636m12.728 12.728A9 9 0 015.636 5.636m12.728 12.728L5.636 5.636" />
        </svg>
      </button>

      <!-- Separation Line -->
      <div class="h-8 w-px bg-white/10"></div>

      <!-- Hang Up / Leave Room Button -->
      <button
        (click)="leaveRoom()"
        class="w-12 h-12 bg-red-600 hover:bg-red-500 text-white rounded-xl flex items-center justify-center transition-all duration-300 active:scale-[0.93] cursor-pointer"
        title="Leave Meeting"
      >
        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 rotate-[135deg]" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M3 5a2 2 0 012-2h3.28a1 1 0 01.94.725l.548 2.2a1 1 0 01-.321.988l-1.305.98a10.582 10.582 0 004.872 4.872l.98-1.305a1 1 0 01.988-.321l2.2.548a1 1 0 01.725.94V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z" />
        </svg>
      </button>

    </div>
  </footer>

</div>
