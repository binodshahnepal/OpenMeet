<div class="min-h-screen w-full flex items-center justify-center bg-gradient-to-br from-slate-950 via-neutral-950 to-neutral-900 text-neutral-100 p-4 relative overflow-hidden">
  <!-- Blurred animated ambient light spots in background -->
  <div class="absolute top-1/4 left-1/4 w-96 h-96 bg-purple-600/10 rounded-full blur-[100px] pointer-events-none animate-pulse"></div>
  <div class="absolute bottom-1/4 right-1/4 w-96 h-96 bg-pink-600/10 rounded-full blur-[100px] pointer-events-none animate-pulse"></div>

  <!-- Glassmorphic Card Container -->
  <div class="w-full max-w-md bg-white/5 backdrop-blur-xl border border-white/10 rounded-3xl p-8 shadow-2xl transition-all duration-300 hover:border-purple-500/30 flex flex-col items-center">
    
    <!-- 1. LOADING STATE -->
    <div *ngIf="isLoading()" class="flex flex-col items-center py-6 text-center animate-fade-in">
      <div class="w-16 h-16 border-4 border-purple-500/30 border-t-purple-500 rounded-full animate-spin mb-6"></div>
      <h1 class="text-2xl font-bold mb-2">Verifying Identity</h1>
      <p class="text-neutral-400 text-sm">Please wait while we confirm your email authenticity...</p>
    </div>

    <!-- 2. SUCCESS STATE -->
    <div *ngIf="!isLoading() && isVerified()" class="flex flex-col items-center text-center animate-fade-in w-full">
      <!-- Checked Animated Circle -->
      <div class="w-20 h-20 bg-emerald-500/10 border border-emerald-500/30 rounded-full flex items-center justify-center mb-6 text-emerald-400 shadow-lg shadow-emerald-500/10 animate-bounce-slow">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-10 w-10" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" />
        </svg>
      </div>
      <h1 class="text-3xl font-extrabold tracking-tight bg-gradient-to-r from-emerald-400 to-teal-400 bg-clip-text text-transparent mb-2">Email Verified</h1>
      <p class="text-neutral-400 text-sm mb-8 px-4 leading-relaxed">Thank you for confirming your identity. Your email has been verified. You can now log in to your account.</p>
      
      <a
        routerLink="/login"
        class="w-full py-3 bg-gradient-to-r from-purple-600 to-pink-500 hover:from-purple-500 hover:to-pink-400 text-white font-semibold rounded-xl transition-all duration-300 shadow-lg shadow-purple-500/20 active:scale-[0.98] text-center cursor-pointer"
      >
        Go to Login
      </a>
    </div>

    <!-- 3. ERROR STATE -->
    <div *ngIf="!isLoading() && errorMessage()" class="flex flex-col items-center text-center animate-fade-in w-full">
      <!-- Error Cross Circle -->
      <div class="w-20 h-20 bg-red-500/10 border border-red-500/30 rounded-full flex items-center justify-center mb-6 text-red-400 shadow-lg shadow-red-500/10">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-10 w-10" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M10 14l2-2m0 0l2-2m-2 2l-2-2m2 2l2 2m7-2a9 9 0 11-18 0 9 9 0 0118 0z" />
        </svg>
      </div>
      <h1 class="text-3xl font-extrabold tracking-tight bg-gradient-to-r from-red-400 to-rose-400 bg-clip-text text-transparent mb-2">Verification Failed</h1>
      <p class="text-neutral-400 text-sm mb-8 px-4 leading-relaxed">{{ errorMessage() }}</p>
      
      <a
        routerLink="/register"
        class="w-full py-3 bg-neutral-900 border border-neutral-800 hover:bg-neutral-800 text-white font-semibold rounded-xl transition-all duration-300 active:scale-[0.98] text-center cursor-pointer"
      >
        Back to Registration
      </a>
    </div>

  </div>
</div>
